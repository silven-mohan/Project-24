<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Project-24</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #06070f;
            --accent: #B19EEF;
            --accent-glow: rgba(177, 158, 239, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hide default cursor */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* Ghost Cursor Canvas Settings */
        canvas#ghost-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }

        /* Content Wrapper */
        .content-container {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            background: linear-gradient(to right, #ffffff, #B19EEF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 48px;
            max-width: 500px;
            line-height: 1.6;
        }

        /* Premium Glassmorphism Button */
        .get-started-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.125rem;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 9999px;
            background: rgba(177, 158, 239, 0.1);
            border: 1px solid rgba(177, 158, 239, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 0 var(--accent);
        }

        .get-started-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 50%);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .get-started-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 10px rgba(177, 158, 239, 0.2);
            transform: translateY(-2px);
        }

        .get-started-btn:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .get-started-btn:active {
            transform: translateY(1px);
        }
        
        /* Interactive elements need cursor none still for the ghost cursor to shine */
        a {
            cursor: none;
        }

    </style>
</head>
<body>

    <canvas id="ghost-cursor"></canvas>

    <div class="content-container">
        <h1>Welcome</h1>
        <p class="subtitle">Experience an elegant and dynamic journey. Hover around to see the ghost cursor effect before you dive in.</p>
        <a href="index.html" class="get-started-btn">Get Started</a>
    </div>

    <script>
        // Ghost Cursor Implementation mapping React props to JS
        // Props from user:
        // trailLength={50}, inertia={0.5}, grainIntensity={0.05}, bloomStrength={0.1},
        // bloomRadius={1}, brightness={2}, color="#B19EEF", edgeIntensity={0}

        const canvas = document.getElementById('ghost-cursor');
        const ctx = canvas.getContext('2d');

        // Settings mapped from JSX props
        const baseSettings = {
            trailLength: 50,
            inertia: 0.5,
            grainIntensity: 0.05,
            bloomStrength: 0.1,
            bloomRadius: 1,
            brightness: 2,
            color: '#B19EEF', // RGB: 177, 158, 239
            edgeIntensity: 0
        };

        let width, height;
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let points = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Parse hex to RGB to allow alpha modifications
        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 177, g: 158, b: 239 };
        }

        const rgbColor = hexToRgb(baseSettings.color);

        function draw() {
            // Apply a slight fade for the 'inertia' and 'grain' feel rather than clearRect
            // This leaves a natural motion blur / trail overlay
            ctx.fillStyle = `rgba(6, 7, 15, ${0.4 - baseSettings.inertia * 0.2})`; 
            ctx.fillRect(0, 0, width, height);

            // Add Grain if applicable
            if(baseSettings.grainIntensity > 0 && Math.random() < 0.2) {
                ctx.fillStyle = `rgba(255,255,255,${baseSettings.grainIntensity})`;
                ctx.fillRect(Math.random()*width, Math.random()*height, 2, 2);
            }

            // Update points
            points.push({ x: mouse.x, y: mouse.y });

            // Truncate to trail length
            if (points.length > baseSettings.trailLength) {
                points.shift();
            }

            // Smoothly draw the trail
            if (points.length > 2) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);

                for (let i = 1; i < points.length - 1; i++) {
                    const xc = (points[i].x + points[i + 1].x) / 2;
                    const yc = (points[i].y + points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                }
                ctx.quadraticCurveTo(
                    points[points.length - 2].x, points[points.length - 2].y, 
                    points[points.length - 1].x, points[points.length - 1].y
                );

                // Bloom effect 
                if (baseSettings.bloomStrength > 0) {
                    ctx.shadowBlur = baseSettings.bloomRadius * 15;
                    ctx.shadowColor = `rgba(${rgbColor.r}, ${rgbColor.g}, ${rgbColor.b}, ${baseSettings.bloomStrength})`;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                // We'll draw the trail with gradient segments or varying alpha based on brightness
                let alphaBase = (baseSettings.brightness / 10); // Scale to sensible alpha
                ctx.lineWidth = 12 + baseSettings.edgeIntensity * 5; 
                
                // Draw path with multiple passes for intensity
                ctx.strokeStyle = `rgba(${rgbColor.r}, ${rgbColor.g}, ${rgbColor.b}, ${0.1 * alphaBase})`;
                ctx.stroke();
                
                ctx.lineWidth = 6 + baseSettings.edgeIntensity * 2;
                ctx.strokeStyle = `rgba(${rgbColor.r}, ${rgbColor.g}, ${rgbColor.b}, ${0.4 * alphaBase})`;
                ctx.stroke();
                
                ctx.lineWidth = 2;
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 * alphaBase})`;
                ctx.stroke();
            }

            requestAnimationFrame(draw);
        }

        draw();

    </script>
</body>
</html>
